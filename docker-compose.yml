services:
  postgres:
    image: postgres:15-alpine
    container_name: previdencia_postgres
    environment:
      POSTGRES_DB: previdenciadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - previdencia_network

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: previdencia_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/previdenciadb
      SECRET_KEY: docker_secret_key_change_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:

      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - previdencia_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: previdencia_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - previdencia_network
    command: npm run dev

  nginx:
    image: nginx:alpine
    container_name: previdencia_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - previdencia_network
    restart: unless-stopped

  # 📊 MONITORAMENTO
  prometheus:
    image: prom/prometheus
    container_name: previdencia_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - previdencia_network

  grafana:
    image: grafana/grafana
    container_name: previdencia_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "3005:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - previdencia_network

  redis:
    image: redis:alpine
    container_name: previdencia_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - previdencia_network

networks:
  previdencia_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  prometheus_data:
  grafana_data:
  redis_data:
